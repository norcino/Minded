pool:
  name: Azure Pipelines
  vmImage: 'ubuntu-latest'
    
steps:
- task: DotNetCoreCLI@2
  displayName: Restore
  inputs:
    command: restore
    projects: '**/*.csproj'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    projects: '**/*.csproj'
    arguments: '--configuration $(BuildConfiguration)'

- pwsh: |
    $ErrorActionPreference = "Continue"
    dotnet pack Minded.sln `
      --version-suffix "rc.$(Build.BuildNumber)" `
      --include-symbols `
      -p:SymbolPackageFormat=snupkg `
      --configuration $(BuildConfiguration) `
      --output $(Build.ArtifactStagingDirectory) `
      2>&1 | Tee-Object -Variable packOutput

    $exitCode = $LASTEXITCODE
    Write-Host "Pack exit code: $exitCode"

    if ($exitCode -ne 0) {
      Write-Host "##[error]Pack failed with exit code $exitCode"
      Write-Host "Full output:"
      Write-Host $packOutput
      exit $exitCode
    }
  displayName: 'Pack non master version'
  condition: ne(variables['Build.SourceBranch'], 'refs/heads/master')

- pwsh: |
    $ErrorActionPreference = "Continue"
    dotnet pack Minded.sln `
      --include-symbols `
      -p:SymbolPackageFormat=snupkg `
      --configuration $(BuildConfiguration) `
      --output $(Build.ArtifactStagingDirectory) `
      2>&1 | Tee-Object -Variable packOutput

    $exitCode = $LASTEXITCODE
    Write-Host "Pack exit code: $exitCode"

    if ($exitCode -ne 0) {
      Write-Host "##[error]Pack failed with exit code $exitCode"
      Write-Host "Full output:"
      Write-Host $packOutput
      exit $exitCode
    }
  displayName: 'Pack master version'
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/master')

- task: DotNetCoreCLI@2
  displayName: 'NuGet Push Minded Feed'
  inputs:
    command: 'push'
    packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg;!$(Build.ArtifactStagingDirectory)/**/*.symbols.nupkg'
    nuGetFeedType: 'internal'
    publishVstsFeed: '781d4237-b045-4959-bd79-25174518b8d8/b371f2d0-81c8-46d0-b653-f90e65088279'

- task: DotNetCoreCLI@2
  displayName: 'NuGet Push Packages - Master only'
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/master')
  inputs:
    command: custom
    custom: nuget
    arguments: 'push $(Build.ArtifactStagingDirectory)/*.nupkg -s https://api.nuget.org/v3/index.json -k $(NugetApiKey) --skip-duplicate'

- task: DotNetCoreCLI@2
  displayName: 'NuGet Push Symbols - Master only'
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/master')
  inputs:
    command: custom
    custom: nuget
    arguments: 'push $(Build.ArtifactStagingDirectory)/*.snupkg -s https://api.nuget.org/v3/index.json -k $(NugetApiKey) --skip-duplicate'

- task: DotNetCoreCLI@2
  displayName: Publish
  inputs:
    command: publish
    publishWebProjects: True
    arguments: '--configuration $(BuildConfiguration) --output $(build.artifactstagingdirectory)'
    zipAfterPublish: True
  enabled: false

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact'
  inputs:
    PathtoPublish: '$(build.artifactstagingdirectory)'
  enabled: false
  condition: succeededOrFailed()
